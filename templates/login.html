<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoVault // Access Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --green: #00ff41; --dim: #00aa29; --dark: #020c02;
      --card: rgba(4,15,4,0.97); --border: rgba(0,255,65,0.3);
      --muted: #3a7a4a;
      --glow: 0 0 10px rgba(0,255,65,0.5),0 0 30px rgba(0,255,65,0.2);
      --glow-s: 0 0 20px rgba(0,255,65,0.8),0 0 60px rgba(0,255,65,0.3);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--dark);color:#e0ffe8;font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    #mc{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.08;pointer-events:none;}
    body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.12) 2px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:1;}
    body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,65,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,65,.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:1;}
    .wrap{position:relative;z-index:2;width:100%;max-width:460px;padding:20px;animation:up .7s ease forwards;}
    @keyframes up{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    .top{text-align:center;margin-bottom:28px;}
    .hex svg{filter:drop-shadow(0 0 10px #00ff41);}
    .logo{font-family:'Orbitron',monospace;font-weight:900;font-size:1.9rem;color:var(--green);text-shadow:var(--glow-s);letter-spacing:.25em;margin-top:10px;}
    .sub{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.4em;margin-top:5px;}
    .online{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--dim);letter-spacing:.2em;margin-top:12px;}
    .dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:var(--glow);margin-right:6px;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .card{background:linear-gradient(160deg,var(--card) 0%,rgba(6,18,6,.99) 100%);border:1px solid var(--border);border-radius:4px;padding:38px 44px;position:relative;box-shadow:0 0 50px rgba(0,255,65,.06),inset 0 0 80px rgba(0,0,0,.5);}
    .card::before{content:'';position:absolute;top:-1px;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);box-shadow:var(--glow);}
    .cc{position:absolute;width:14px;height:14px;}
    .cc.tl{top:8px;left:8px;border-top:1px solid var(--dim);border-left:1px solid var(--dim);}
    .cc.tr{top:8px;right:8px;border-top:1px solid var(--dim);border-right:1px solid var(--dim);}
    .cc.bl{bottom:8px;left:8px;border-bottom:1px solid var(--dim);border-left:1px solid var(--dim);}
    .cc.br{bottom:8px;right:8px;border-bottom:1px solid var(--dim);border-right:1px solid var(--dim);}
    .th{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--muted);letter-spacing:.2em;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid rgba(0,255,65,.1);display:flex;justify-content:space-between;}
    .th span:last-child{color:var(--green);animation:blink 1s step-end infinite;}
    @keyframes blink{50%{opacity:0}}
    .title{font-family:'Orbitron',monospace;font-weight:700;font-size:1.05rem;color:var(--green);text-shadow:var(--glow);letter-spacing:.15em;margin-bottom:26px;}
    .fg{margin-bottom:20px;}
    label{display:block;font-family:'Share Tech Mono',monospace;font-size:.67rem;color:var(--dim);letter-spacing:.25em;text-transform:uppercase;margin-bottom:8px;}
    input[type=text]{width:100%;background:rgba(0,20,5,.8);border:1px solid rgba(0,255,65,.22);border-radius:2px;color:var(--green);font-family:'Share Tech Mono',monospace;font-size:.95rem;padding:13px 16px;outline:none;transition:all .25s;caret-color:var(--green);}
    input[type=text]:focus{border-color:var(--green);box-shadow:var(--glow),inset 0 0 20px rgba(0,255,65,.04);background:rgba(0,30,8,.9);}
    input::placeholder{color:rgba(0,170,41,.35);font-size:.8rem;}
    .btn{display:block;width:100%;background:transparent;color:var(--green);border:1px solid var(--green);box-shadow:var(--glow);border-radius:2px;font-family:'Orbitron',monospace;font-weight:700;font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;padding:14px 32px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;margin-top:26px;}
    .btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,255,65,.12),transparent);transition:left .45s;}
    .btn:hover::before{left:100%;}
    .btn:hover{background:rgba(0,255,65,.07);box-shadow:var(--glow-s);color:#fff;}
    .links{display:flex;justify-content:center;margin-top:20px;gap:8px;font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--muted);}
    .links a{color:var(--dim);text-decoration:none;transition:color .2s;}
    .links a:hover{color:var(--green);text-shadow:var(--glow);}
    .warn{margin-top:22px;padding:10px 14px;border:1px solid rgba(0,255,65,.1);border-left:2px solid var(--dim);background:rgba(0,255,65,.02);font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:.07em;line-height:1.65;}
  </style>
</head>
<body>
<canvas id="mc"></canvas>
<div class="wrap">
  <div class="top">
    <div class="hex">
      <svg width="62" height="62" viewBox="0 0 60 60" fill="none">
        <polygon points="30,3 54,17 54,43 30,57 6,43 6,17" stroke="#00ff41" stroke-width="1.5" fill="none"/>
        <polygon points="30,12 46,21 46,39 30,48 14,39 14,21" stroke="#00aa29" stroke-width="1" fill="none" opacity=".5"/>
        <circle cx="30" cy="30" r="6" fill="#00ff41" opacity=".9"/>
        <circle cx="30" cy="30" r="10" stroke="#00ff41" stroke-width=".5" fill="none" opacity=".4"/>
      </svg>
    </div>
    <div class="logo">CRYPTOVAULT</div>
    <div class="sub">DECENTRALIZED · SECURE · SOVEREIGN</div>
    <div class="online"><span class="dot"></span>NODE ONLINE · MAINNET CONNECTED</div>
  </div>

  <div class="card">
    <div class="cc tl"></div><div class="cc tr"></div><div class="cc bl"></div><div class="cc br"></div>
    <div class="th"><span>// IDENTITY_VERIFICATION.exe</span><span>■</span></div>
    <div class="title">ACCESS TERMINAL</div>
    <form action="/login" method="POST">
      <div class="fg">
        <label>⬡ NODE IDENTIFIER</label>
        <input type="text" name="username" placeholder="ENTER_USERNAME" required autocomplete="off">
      </div>
      <button type="submit" class="btn">INITIALIZE ZKP AUTH →</button>
    </form>
    <div class="links"><span>NO ACCOUNT?</span><a href="/register">[ REGISTER NEW WALLET ]</a></div>
    <div class="warn">⚠ ZKP PROTOCOL ACTIVE — ZERO KNOWLEDGE PROOF AUTHENTICATION.<br>YOUR CREDENTIALS ARE NEVER TRANSMITTED OVER THE NETWORK.</div>
  </div>
</div>
<script>
!function(){const c=document.getElementById('mc'),x=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;const ch='アイウエオカキクケコ0123456789ABCDEF$#@%&※◆▲',fs=13,cols=Math.floor(c.width/fs),d=Array(cols).fill(1);function draw(){x.fillStyle='rgba(2,12,2,.05)';x.fillRect(0,0,c.width,c.height);x.font=fs+'px monospace';for(let i=0;i<d.length;i++){const t=ch[Math.floor(Math.random()*ch.length)];x.fillStyle=Math.random()>.97?'#fff':Math.random()>.8?'#00aa29':'#00ff41';x.fillText(t,i*fs,d[i]*fs);if(d[i]*fs>c.height&&Math.random()>.975)d[i]=0;d[i]++}}setInterval(draw,45);window.addEventListener('resize',()=>{c.width=innerWidth;c.height=innerHeight})}();
</script>
</body>
</html>
